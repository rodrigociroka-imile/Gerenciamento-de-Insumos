<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCI – Inventário</title>
    <link rel="shortcut icon" href="./img/CDC-ESTOQUE.png">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

    <style>
      body {
        background-color: #f2f6ff;
        font-family: "Segoe UI", sans-serif;
      }
      .navbar {
        background: linear-gradient(135deg, #0d6efd, #0a58ca);
      }
      .card {
        border: none;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }
      .table-fixed {
        max-height: 520px;
        overflow: auto;
      }
      .img-thumbnail {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <nav id="navbar" class="navbar navbar-dark d-none">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1 fw-bold"
          ><i class="fas fa-warehouse"></i> Inventário</span
        >
        <div class="d-flex align-items-center gap-3">
          <span class="text-white fw-semibold">
            Bem-vindo, <strong id="userName">Usuário</strong>
          </span>
          <button onclick="logout()" class="btn btn-outline-light btn-sm">
            <i class="fas fa-sign-out-alt"></i> Sair
          </button>
        </div>
      </div>
    </nav>

    <div
      id="loginScreen"
      class="container d-flex align-items-center justify-content-center min-vh-100"
    >
      <div class="card shadow-lg" style="width: 100%; max-width: 440px">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="fa-solid fa-boxes-stacked fa-4x text-primary mb-3"></i>
            <h2 class="fw-bold">Inventário</h2>
            <p class="text-muted">Verifique saldos e gere relatório.</p>
          </div>
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Login</label>
              <input
                type="text"
                id="loginInput"
                class="form-control form-control-lg"
                placeholder="Informe o login"
                required
              />
            </div>
            <div class="mb-4">
              <label class="form-label">Senha</label>
              <input
                type="password"
                id="senhaInput"
                class="form-control form-control-lg"
                placeholder="Informe a senha"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">
              Entrar no Sistema
            </button>
          </form>
          <div class="text-center mt-4 text-muted small">
            <strong>Teste:</strong> login <code>inventario</code> • senha
            <code>inv123</code>
          </div>
        </div>
      </div>
    </div>

    <div id="mainScreen" class="d-none container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="fw-bold text-primary mb-1">Inventário</h2>
          <p class="text-muted mb-0">Saldos calculados automaticamente.</p>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-primary" onclick="renderInventory()">
            <i class="fas fa-sync-alt me-2"></i> Atualizar
          </button>
          <button class="btn btn-primary" onclick="gerarPDF()">
            <i class="fas fa-file-pdf me-2"></i> Exportar PDF
          </button>
        </div>
      </div>

      <div class="card">
        <div class="card-body p-0">
          <div class="p-3">
            <input id="inventorySearch" class="form-control" placeholder="Buscar produto..." />
          </div>
          <div class="table-fixed">
            <table class="table table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>Código</th>
                  <th>Produto</th>
                  <th>Entrada</th>
                  <th>Saída</th>
                  <th>Saldo</th>
                  <th>Imagem</th>
                </tr>
              </thead>
              <tbody id="inventoryTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal de detalhes do inventário -->
    <div class="modal fade" id="inventoryModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Detalhes do Produto</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <dl class="row">
              <dt class="col-4">Código</dt>
              <dd class="col-8" id="invModalCodigo"></dd>
              <dt class="col-4">Produto</dt>
              <dd class="col-8" id="invModalNome"></dd>
              <dt class="col-4">Entrada</dt>
              <dd class="col-8" id="invModalEntrada"></dd>
              <dt class="col-4">Saída</dt>
              <dd class="col-8" id="invModalSaida"></dd>
              <dt class="col-4">Saldo</dt>
              <dd class="col-8" id="invModalSaldo"></dd>
            </dl>
            <div class="text-center mt-3">
              <img
                id="invModalImage"
                src="https://via.placeholder.com/140x140?text=N/D"
                class="img-thumbnail"
                alt="Imagem do produto"
              />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
              Fechar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="acesso.js"></script>
    <script type="module">
      import { DB } from './bd.js';

      let inventoryItems = [];

      async function renderInventory() {
        const table = document.getElementById('inventoryTable');
        table.innerHTML = '';

        const filter = String(document.getElementById('inventorySearch')?.value || '').trim().toLowerCase();

        inventoryItems = await DB.getInventory();
        const items = filter
          ? inventoryItems.filter((item) => String(item.nome || '').toLowerCase().includes(filter))
          : inventoryItems;

        if (!items.length) {
          table.innerHTML =
            '<tr><td colspan="6" class="text-center text-muted">Nenhuma movimentação encontrada.</td></tr>';
          return;
        }

        items.forEach((item) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${item.codigo || '-'}</td>
            <td>${item.nome || '-'}</td>
            <td>${item.entrada || 0}</td>
            <td>${item.saida || 0}</td>
            <td>${item.saldo || 0}</td>
            <td>
              <img src="${item.imagem || 'https://via.placeholder.com/70x70?text=N/D'}" class="img-thumbnail" />
            </td>
          `;
          tr.style.cursor = 'pointer';
          tr.addEventListener('click', () => openInventoryModal(item));
          table.appendChild(tr);
        });
      }

      function openInventoryModal(item) {
        document.getElementById('invModalCodigo').textContent = item.codigo || '-';
        document.getElementById('invModalNome').textContent = item.nome || '-';
        document.getElementById('invModalEntrada').textContent = item.entrada || 0;
        document.getElementById('invModalSaida').textContent = item.saida || 0;
        document.getElementById('invModalSaldo').textContent = item.saldo || 0;
        document.getElementById('invModalImage').src =
          item.imagem || 'https://via.placeholder.com/140x140?text=N/D';
        new bootstrap.Modal(document.getElementById('inventoryModal')).show();
      }

      document.getElementById('inventorySearch').addEventListener('input', () => {
        renderInventory();
      });

      // Expor funções para os botões inline
      window.renderInventory = renderInventory;
      window.gerarPDF = gerarPDF;

      async function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const items = await DB.getInventory();

        doc.setFontSize(18);
        doc.text('Relatório de Inventário', 20, 20);
        doc.setFontSize(10);
        doc.text('Gerado em: ' + new Date().toLocaleString('pt-BR'), 20, 28);

        const columns = ['Código', 'Produto', 'Entrada', 'Saída', 'Saldo'];
        const body = items.map((item) => [
          item.codigo || '-',
          item.nome || '-',
          item.entrada || 0,
          item.saida || 0,
          item.saldo || 0,
        ]);

        doc.autoTable({
          startY: 35,
          head: [columns],
          body,
          theme: 'grid',
          styles: { fontSize: 9, cellPadding: 3 },
          headStyles: { fillColor: [13, 110, 253] },
          margin: { left: 15, right: 15 },
        });

        doc.save(`inventario_${new Date().toISOString().slice(0, 10)}.pdf`);
      }

      window.addEventListener('load', () => {
        access.initAccess({
          mainScreenId: 'mainScreen',
          navbarId: 'navbar',
          userNameId: 'userName',
          userDisplayName: 'Usuário',
          validLogin: 'inventario',
          validSenha: 'inv123',
          onLogin: renderInventory,
        });

        if (access.isLoggedIn()) {
          renderInventory();
        }
      });
    </script>
  </body>
</html>
