<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f2f4f7"></rect>

  <!-- Outer circle -->
  <circle cx="512" cy="512" r="380" stroke="#1f2f4a" stroke-width="16" fill="none"></circle>

  <!-- Compass ticks -->
  <g stroke="#1f2f4a" stroke-width="10">
    <line x1="512" y1="100" x2="512" y2="160"></line>
    <line x1="512" y1="864" x2="512" y2="924"></line>
    <line x1="100" y1="512" x2="160" y2="512"></line>
    <line x1="864" y1="512" x2="924" y2="512"></line>
  </g>

  <!-- Panda geometric head -->
  <g fill="#1f2f4a">
    <!-- ears -->
    <circle cx="380" cy="360" r="70"></circle>
    <circle cx="644" cy="360" r="70"></circle>
  </g>

  <!-- head -->
  <polygon points="320,420 512,300 704,420 660,660 364,660" fill="#ffffff" stroke="#1f2f4a" stroke-width="10"></polygon>

  <!-- eye patches -->
  <ellipse cx="420" cy="480" rx="60" ry="70" fill="#1f2f4a"></ellipse>
  <ellipse cx="604" cy="480" rx="60" ry="70" fill="#1f2f4a"></ellipse>

  <!-- eyes -->
  <circle cx="420" cy="480" r="20" fill="#ffffff"></circle>
  <circle cx="604" cy="480" r="20" fill="#ffffff"></circle>

  <!-- nose -->
  <polygon points="512,520 480,560 544,560" fill="#1f2f4a"></polygon>

  <!-- mouth -->
  <path d="M480 580 Q512 610 544 580" stroke="#1f2f4a" stroke-width="8" fill="none"></path>

</svg>