<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCI – Expedição</title>
    <link rel="shortcut icon" href="./img/CDC-ESTOQUE.png">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
    />

    <!-- html5-qrcode -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
      body {
        background-color: #f2f6ff;
        font-family: "Segoe UI", sans-serif;
      }
      .navbar {
        background: linear-gradient(135deg, #0d6efd, #0a58ca);
      }
      .card {
        border: none;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.09);
      }
      .preview-img {
        max-width: 260px;
        max-height: 260px;
        object-fit: cover;
        border-radius: 12px;
      }
      .table-fixed {
        max-height: 360px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <nav id="navbar" class="navbar navbar-dark d-none">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1 fw-bold"
          ><i class="fas fa-boxes"></i> Expedição</span
        >
        <div class="d-flex align-items-center gap-3">
          <span class="text-white fw-semibold">
            Bem-vindo, <strong id="userName">Usuário</strong>
          </span>
          <button onclick="logout()" class="btn btn-outline-light btn-sm">
            <i class="fas fa-sign-out-alt"></i> Sair
          </button>
        </div>
      </div>
    </nav>

    <div
      id="loginScreen"
      class="container d-flex align-items-center justify-content-center min-vh-100"
    >
      <div class="card shadow-lg" style="width: 100%; max-width: 440px">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="fa-solid fa-truck-fast fa-4x text-primary mb-3"></i>
            <h2 class="fw-bold">Expedição</h2>
            <p class="text-muted">Registre saídas utilizando QR ou seleção manual.</p>
          </div>
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Login</label>
              <input
                type="text"
                id="loginInput"
                class="form-control form-control-lg"
                placeholder="Informe o login"
                required
              />
            </div>
            <div class="mb-4">
              <label class="form-label">Senha</label>
              <input
                type="password"
                id="senhaInput"
                class="form-control form-control-lg"
                placeholder="Informe a senha"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">
              Entrar no Sistema
            </button>
          </form>
          <div class="text-center mt-4 text-muted small">
            <strong>Teste:</strong> login <code>expedicao</code> • senha
            <code>exp123</code>
          </div>
        </div>
      </div>
    </div>

    <div id="mainScreen" class="d-none container py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="fw-bold text-primary mb-1">Registrar Saída</h2>
          <p class="text-muted mb-0">
            Escolha o produto (ou escaneie o QR) e registre a saída.
          </p>
        </div>
        <button id="btnRefreshSaida" class="btn btn-outline-primary">
          <i class="fas fa-sync-alt me-2"></i> Atualizar lista
        </button>
      </div>

      <div class="row g-3">
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header bg-primary text-white">
              <strong>Registrar Saída</strong>
            </div>
            <div class="card-body">
              <div class="mb-3">
                <label class="form-label">Produto</label>
                <input id="produtoSearch" class="form-control mb-2" placeholder="Buscar produto..." />
                <select id="produtoSelect" class="form-select"></select>
              </div>

              <div class="mb-3 d-flex gap-2">
                <button class="btn btn-outline-secondary flex-grow-1" onclick="abrirModalQR()">
                  <i class="fas fa-qrcode me-1"></i> Escanear QR
                </button>
                <button class="btn btn-outline-secondary flex-grow-1" onclick="carregarProdutos()">
                  <i class="fas fa-sync-alt me-1"></i> Atualizar produtos
                </button>
              </div>

              <div class="mb-3">
                <label class="form-label">Nome do Produto</label>
                <input id="nomeSaida" class="form-control" readonly />
              </div>

              <div class="mb-3">
                <label class="form-label">Imagem</label>
                <img
                  id="previewSaida"
                  class="preview-img border d-block mx-auto"
                  src="https://via.placeholder.com/260x260/eeeeee/999999?text=Sem+Imagem"
                  alt="Preview"
                />
              </div>

              <div class="mb-3 row g-2">
                <div class="col-6">
                  <label class="form-label">Quantidade</label>
                  <input id="qtSaida" type="number" min="1" class="form-control" />
                </div>
                <div class="col-6">
                  <label class="form-label">Data / Hora</label>
                  <input id="dataHoraSaida" class="form-control" readonly />
                </div>
              </div>

              <div class="mb-3 row g-2">
                <div class="col-6">
                  <label class="form-label">Local</label>
                  <input id="localSaida" class="form-control" />
                </div>
                <div class="col-6">
                  <label class="form-label">Observação</label>
                  <input id="obs" class="form-control" />
                </div>
              </div>

              <div class="d-flex justify-content-between gap-2">
                <button type="button" id="btnFotoSaida" class="btn btn-outline-secondary flex-grow-1" onclick="openCameraSaida()">
                  <i class="fas fa-camera me-1"></i> Foto
                </button>
                <button type="button" class="btn btn-primary flex-grow-1" onclick="salvarSaida()">
                  <i class="fas fa-save me-1"></i> Salvar Saída
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="card">
            <div class="card-header bg-secondary text-white">
              <strong>Últimas Saídas</strong>
            </div>
            <div class="card-body p-0">
              <div class="table-fixed">
                <table class="table table-hover mb-0">
                  <thead class="table-light">
                    <tr>
                      <th>Nome do Produto</th>
                      <th>Qt</th>
                      <th>Local</th>
                      <th>Ações</th>
                    </tr>
                  </thead>
                  <tbody id="listaSaidas"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal QR -->
    <div class="modal fade" id="qrModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Escanear QR Code</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body text-center">
            <div id="qr-reader" style="min-height: 300px;"></div>
            <div id="qr-reader__status" class="text-muted mt-3"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Câmera -->
    <div class="modal fade" id="cameraModalSaida" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Capturar Foto</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body text-center">
            <video id="videoSaida" playsinline style="width:100%; max-height:360px;"></video>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
              Cancelar
            </button>
            <button type="button" class="btn btn-primary" onclick="capturarFotoSaida()">
              Capturar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="acesso.js"></script>
    <script type="module">
      import { DB } from './bd.js';

      let currentImageSaida = '';
      let currentStreamSaida = null;
      let html5QrCode = null;
      let entradasCache = [];
      let produtoFilter = '';

      document.getElementById('produtoSearch').addEventListener('input', (e) => {
        produtoFilter = String(e.target.value || '').trim().toLowerCase();
        carregarProdutos();
      });

      access.initAccess({
        mainScreenId: 'mainScreen',
        navbarId: 'navbar',
        userNameId: 'userName',
        userDisplayName: 'Rodrigo',
        validLogin: 'expedicao',
        validSenha: 'exp123',
        onLogin: async () => {
          document.getElementById('dataHoraSaida').value =
            new Date().toLocaleString('pt-BR');
          await carregarProdutos();
          await carregarSaidas();
          updateFotoButtonVisibility();
        },
      });

      async function carregarProdutos() {
        const select = document.getElementById('produtoSelect');
        entradasCache = await DB.getEntradas();

        const entradas = produtoFilter
          ? entradasCache.filter((ent) =>
              String(ent.nome || '').toLowerCase().includes(produtoFilter),
            )
          : entradasCache;

        select.innerHTML = '<option value="">Selecione ou escaneie o produto...</option>';
        entradas.forEach((ent) => {
          const opt = document.createElement('option');
          opt.value = ent.id;
          opt.textContent = `${ent.nome} (ID: ${ent.id}) – Qt: ${ent.quantidade}`;
          if (ent.qrData) opt.dataset.qrCode = ent.qrData;
          select.appendChild(opt);
        });

        updateFotoButtonVisibility();
      }

      async function carregarSaidas() {
        const saidas = (await DB.getSaidas()).reverse();
        const tbody = document.getElementById('listaSaidas');
        tbody.innerHTML = '';
        saidas.slice(0, 12).forEach((s) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${s.nome || '-'}</td>
            <td>${s.quantidade || 0}</td>
            <td>${s.local || '-'}</td>
            <td class="text-end">
              <button class="btn btn-sm btn-danger" onclick="deletarSaida('${s.id}')">
                <i class="fas fa-trash"></i>
              </button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      async function deletarSaida(id) {
        if (!id) return;
        if (!confirm('Deseja realmente excluir esta saída?')) return;
        await DB.deleteSaida(id);
        await carregarSaidas();
      }

      function openCameraSaida() {
        const modal = new bootstrap.Modal(document.getElementById('cameraModalSaida'));
        modal.show();
        navigator.mediaDevices
          .getUserMedia({ video: { facingMode: 'environment' } })
          .then((stream) => {
            currentStreamSaida = stream;
            document.getElementById('videoSaida').srcObject = stream;
          })
          .catch((err) => {
            alert('Não foi possível acessar a câmera: ' + err.message);
            modal.hide();
          });
      }

      function capturarFotoSaida() {
        const video = document.getElementById('videoSaida');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        currentImageSaida = canvas.toDataURL('image/png');
        document.getElementById('previewSaida').src = currentImageSaida;
        closeCameraModalSaida();
        updateFotoButtonVisibility();
      }

      function closeCameraModalSaida() {
        if (currentStreamSaida) {
          currentStreamSaida.getTracks().forEach((t) => t.stop());
          currentStreamSaida = null;
        }
        bootstrap.Modal.getInstance(document.getElementById('cameraModalSaida')).hide();
      }

      document.getElementById('produtoSelect').addEventListener('change', async () => {
        const id = document.getElementById('produtoSelect').value;
        if (!id) return;
        const produto = entradasCache.find((e) => e.id === id);
        if (produto) preencherProduto(produto);
      });

      function updateFotoButtonVisibility() {
        const btn = document.getElementById('btnFotoSaida');
        const previewSrc = document.getElementById('previewSaida').src || '';
        const hasImage = previewSrc && !previewSrc.includes('via.placeholder.com');
        if (btn) {
          btn.classList.toggle('d-none', hasImage);
        }
      }

      function preencherProduto(produto) {
        document.getElementById('nomeSaida').value = produto.nome;
        document.getElementById('previewSaida').src =
          produto.imagem || 'https://via.placeholder.com/260x260/eeeeee/999999?text=Sem+Imagem';
        currentImageSaida = produto.imagem || '';
        document.getElementById('produtoSelect').value = produto.id;
        updateFotoButtonVisibility();
      }

      async function salvarSaida() {
        const nome = document.getElementById('nomeSaida').value.trim();
        const qt = document.getElementById('qtSaida').value;
        const local = document.getElementById('localSaida').value.trim();
        const obs = document.getElementById('obs').value.trim();

        if (!nome || !qt) {
          alert('Preencha o produto e a quantidade.');
          return;
        }

        const saida = {
          id: Date.now().toString(36).toUpperCase(),
          nome,
          quantidade: Number(qt),
          local,
          obs,
          imagem: currentImageSaida,
          dataHora: new Date().toLocaleString('pt-BR'),
        };

        await DB.addSaida(saida);
        alert('Saída salva com sucesso.');
        document.getElementById('formSaida').reset();
        document.getElementById('dataHoraSaida').value =
          new Date().toLocaleString('pt-BR');
        document.getElementById('previewSaida').src =
          'https://via.placeholder.com/260x260/eeeeee/999999?text=Sem+Imagem';
        currentImageSaida = '';
        updateFotoButtonVisibility();
        await carregarSaidas();
      }

      function abrirModalQR() {
        const modal = new bootstrap.Modal(document.getElementById('qrModal'));
        modal.show();
        initQrReader();
      }

      function initQrReader() {
        if (!html5QrCode) {
          html5QrCode = new Html5Qrcode('qr-reader');
        }

        html5QrCode
          .start(
            { facingMode: 'environment' },
            { fps: 10, qrbox: 320 },
            onScanSuccess,
            () => {},
          )
          .catch((err) => {
            document.getElementById('qr-reader__status').innerText =
              'Não foi possível iniciar a câmera. Permita o acesso.';
          });

        const qrModalEl = document.getElementById('qrModal');
        if (qrModalEl) {
          qrModalEl.addEventListener('hidden.bs.modal', () => {
            if (html5QrCode) {
              html5QrCode.stop().then(() => html5QrCode.clear()).catch(() => {});
            }
          });
        }
      }

      async function onScanSuccess(decodedText) {
        const entradas = await DB.getEntradas();
        const produto = entradas.find(
          (e) => e.qrData === decodedText || e.id === decodedText,
        );

        if (produto) {
          preencherProduto(produto);
          alert(`Produto encontrado: ${produto.nome}`);
          const modal = bootstrap.Modal.getInstance(document.getElementById('qrModal'));
          if (modal) modal.hide();
          if (html5QrCode) {
            html5QrCode.stop().then(() => html5QrCode.clear());
          }
        } else {
          document.getElementById('qr-reader__status').innerText =
            'QR não encontrado no banco. Verifique o produto.';
        }
      }

      document.getElementById('btnRefreshSaida').addEventListener('click', async () => {
        await carregarProdutos();
        await carregarSaidas();
      });

      // Expor funções para botões inline
      window.abrirModalQR = abrirModalQR;
      window.carregarProdutos = carregarProdutos;
      window.salvarSaida = salvarSaida;
      window.deletarSaida = deletarSaida;
      window.openCameraSaida = openCameraSaida;
      window.capturarFotoSaida = capturarFotoSaida;
    </script>
  </body>
</html>
